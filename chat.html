<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Cam𐌅ind</title>
    <link rel="stylesheet" href="styles.css?v=1772238113500">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: var(--bg-color);
        }

        .chat-app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        @media (min-width: 800px) {
            .chat-app-wrapper {
                border-left: 1px solid rgba(255, 255, 255, 0.05);
                border-right: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        .chat-header {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.1);
        }

        .message-bubble {
            max-width: 85%;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-mine {
            align-self: flex-end;
            background: var(--accent-primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-theirs {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 0.8rem;
            backdrop-filter: blur(10px);
            padding-bottom: env(safe-area-inset-bottom, 1rem);
            /* Safe area for iOS */
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 24px;
            font-family: inherit;
            font-size: 1rem;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .bg-glow,
        .bg-glow-2 {
            display: none !important;
        }
    </style>
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body
    style="margin: 0; padding: 0; background: #0f172a; overflow: hidden; height: 100dvh; width: 100vw; display: flex;">

    <!-- Global Loader -->
    <div id="global-loader" class="global-loader">
        <div class="loader-content">
            <div class="solar-system-loader">
                <div class="sun"></div>
                <div class="orbit orbit-1">
                    <div class="planet planet-1"></div>
                </div>
                <div class="orbit orbit-2">
                    <div class="planet planet-2"></div>
                </div>
                <div class="orbit orbit-3">
                    <div class="planet planet-3"></div>
                </div>
            </div>
            <div class="loader-text">Cam𐌅ind</div>
        </div>
    </div>


    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- Navbar removed for chat -->

    <main class="chat-app-wrapper">
        <div class="chat-header">
            <a href="dashboard.html"
                style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); color: white; text-decoration: none; flex-shrink: 0; border: 1px solid rgba(255, 255, 255, 0.1);"
                title="Back to Dashboard">
                <span class="material-icons-round" style="font-size: 1.2rem; margin: 0;">arrow_back</span>
            </a>
            <div style="flex: 1; display: flex; align-items: center; gap: 0.8rem;">
                <span class="material-icons-round" style="font-size: 1.8rem; color: var(--accent-primary);">chat</span>
                <div>
                    <h2 id="chat-title" style="font-size: 1.1rem; margin: 0; font-weight: 600;">Loading Chat...</h2>
                    <p style="color: var(--text-secondary); font-size: 0.85rem; margin: 0;">Secure conversation</p>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <!-- Injected via JS -->
        </div>

        <form class="chat-input-area" id="chat-form">
            <input type="text" class="chat-input" id="chat-input" placeholder="Message..." required autocomplete="off">
            <button type="submit" class="btn btn-primary"
                style="display: flex; align-items: center; justify-content: center; width: 40px; min-width: 40px; height: 40px; border-radius: 50%; padding: 0; flex-shrink: 0;">
                <span class="material-icons-round" style="margin: 0; font-size: 1.2rem;">send</span>
            </button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script type="module" src="script.js?v=1772238113500"></script>
</body>

</html>
